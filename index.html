# 治験文書 翻訳ワークフロー — 設計サマリー

**LLM × HITL × 記録 の統合アーキテクチャ｜内部設計ドキュメント**

> 目的：治験関連文書の翻訳を、既存メンバーの人手プロセスから脱却させつつ品質を底上げする。
> LLM で下訳・機械 QA を行い、人間はレビュー（裁定）に集中し、判定を証跡として記録する。
> 本文書は Microsoft Foundry（旧 Azure AI Foundry）を中核に、記録層・レビューアプリまでを含む
> エンドツーエンドの設計方針をまとめたもの。

---

## 0. この文書について

- 位置づけ：意思決定前の設計サマリー（PoC・社内検証の前提）。
- 想定読者：STO 社内（設計・実装担当）、およびレビュー運用に関わる担当。
- ステータス：構成方針は確定。具体実装（パイプライン／台帳スキーマ／レビュー画面）はこれから。

---

## 1. 背景と狙い

現状は、治験文書の翻訳を人が全訳し、人が全体をレビューし、記録は属人的に散逸している。担当ごとに用語がばらつき、証跡も残りにくい。

新ワークフローは、これを次のように変える。**人を機械で置き換えるのではなく、人の役割を「全訳」から「裁定」へ移す。** レビュー（人の判断）は残す。

| | 現状（人手プロセス） | 新プロセス |
|---|---|---|
| 翻訳 | 人が全文を翻訳 | LLM が用語集準拠で下訳 |
| チェック | 人が全体をレビュー | 別 LLM が QA で一次チェック → 人は指摘箇所だけ裁定 |
| 記録 | 属人的・散逸 | 判定を台帳に証跡化 |
| 品質 | 担当ごとにばらつく | 用語統一・機械 QA・証跡で底上げ |

機械を足すのに品質が上がる理由は3点。(1) 用語対訳表で規定訳が毎回そろう、(2) 人が読む前に QA が訳抜け・誤訳を拾う、(3) 判定が記録として残り品質が測れる・監査に耐える。

> 期待値の注意：MVP が証明するのは「ループが回ること」であり、初日から熟練者の全訳を超えるわけではない。品質の伸びは、用語集・QA・確定的な用語突合を調整するほど後から効いてくる。

---

## 2. 全体アーキテクチャ

分類 → 翻訳 → QA 検証 → ゲート → 人間レビュー → 記録。不合格・却下は前段へ差し戻す（2本のループ）。用語対訳表と ICH 定訳は、翻訳エージェントに参照リソース（グラウンディング）として持たせる（並列ブランチではない）。

```mermaid
flowchart TD
  A([Start]) --> B["変数の設定<br/>原文を Local.SourceText へ"]
  B --> C["① 文書分類<br/>カテゴリ判定・JSON出力"]
  C --> D["② 翻訳<br/>用語集・ICH準拠で下訳"]
  G1["用語対訳表<br/>5ソース優先"]:::ref -.->|参照| D
  G2["ICH定訳・整合基準"]:::ref -.->|参照| D
  D --> E["③ 品質チェック<br/>別LLMで検証・JSON出力"]
  E --> F{"QAゲート<br/>合格?"}
  F -->|不合格| D
  F -->|合格| H["人間レビュー<br/>質問する / HITL"]
  H --> I{"承認ゲート<br/>承認?"}
  I -->|却下| D
  I -->|承認| J["最終出力 → 台帳に記録"]
  classDef ref fill:#E1F5EE,stroke:#0F6E56,color:#04342C;
```

差し戻しループ（QAゲート・承認ゲート → ②翻訳）は、Foundry の「ノードに移動（Go to node）」に相当する。

---

## 3. パイプライン各ステージ

各ステージは Foundry のノード型に対応する。

| ステージ | Foundry ノード | 要点 |
|---|---|---|
| 変数の設定 | Set variable | 原文を `Local.SourceText` に格納。全下流が参照 |
| ① 文書分類 | Invoke agent | カテゴリ判定（治験実施計画書／同意説明文書／CSR／IB／SOP 等）。**JSON Schema 出力**で `Local.DocCategory` に保存 |
| ② 翻訳 | Invoke agent | 用語対訳表・ICH をグラウンディングして下訳。規制用語は LLM 任せにせず**確定的な対訳突合**を1層挟む |
| ③ 品質チェック | Invoke agent（別LLM） | 訳抜け・誤訳・用語不整合・ICH整合を検査。`{pass, issues[], confidence}` を JSON で保存 |
| QAゲート | If/else | 不合格／低信頼なら「ノードに移動」で②へ差し戻し。合格なら次へ |
| 人間レビュー | Ask a question | レビュアーに承認可否を問う（HITL） |
| 承認ゲート | If/else | 却下なら②へ差し戻し、承認なら最終出力を確定 |

**設計の要点**

- **変数スコープ**：Foundry の変数は Power Fx で扱い、`System.`（読み取り専用のシステム変数、例 `System.LastMessage.Text`）と `Local.`（自作のローカル変数）の接頭辞を付ける。
- **用語の確定性**：MedDRA/ICH の規定訳は「合っていると説明できる」必要がある。生成任せにせず、③の中か④の後に決定論的な対訳突合を置く。
- **カテゴリ別ルーティング**：文書種別で用語集サブセットや厳格度を変えるなら、②直後に If/else を足す（拡張余地）。

---

## 4. 3層構造と関与者マップ

Foundry ワークフローは全体の「背骨（オーケストレーション）」。人が関わる接点は3つ（構築・レビュー・監査）あり、Foundry の UI を直接触るのは**構築**だけ。レビューと監査で人が見る画面は Foundry の外にある。

| 工程 | 関与する人 | UI 画面 | Foundry モジュール |
|---|---|---|---|
| ① 構築 | オーサー（STO） | Foundry ビルダー（ビジュアライザ／YAML／コード） | 全ノードを定義 |
| ② 自動処理 | 関与なし | UI なし（背景で実行） | 変数設定→3エージェント→QAゲート |
| ③ 人間レビュー | レビュアー（RA／翻訳担当） | レビューアプリ（キュー＋裁定画面） | 質問する → 承認ゲート（UI は外部で拡張） |
| ④ 記録・監査 | 監査／QA 担当 | 監査台帳（Dataverse / SharePoint リスト） | Foundry 外（書込 → 状態更新 → 再開） |

つまりレベルが3つに分かれ、状態フラグと待機／再開で1本につながる：背骨＝Foundry（②中心、①③の一部）／人の接点＝外部 UI（③④）／記録＝永続台帳（④）。

---

## 5. HITL 設計 — レビューは残す

Foundry の「質問する」ノードは**チャットで質問して返答を変数に保存するだけ**で、センテンス単位で1文ずつ○×を付ける UI にはならない。よって専用のレビュー画面を Foundry の外に用意する。

粒度は「全文採点」ではなく「④の QA が立てた指摘だけを人が裁く」。人の動線：

1. キューを開く（要確認の文書を選ぶ）
2. 指摘を確認（原文／訳文ドラフト／QA 指摘を対比）
3. 裁定（指摘ごとに 承認／修正／却下）
4. 一括承認（指摘のない文は自動承認）
5. 送信（判定を台帳へ記録）

送信時に残す監査項目：レビュアー、日時、用語集バージョン、モデル/プロンプト ver、セグメント別判定、差し戻し理由。

> **担保するのは⑥の人間承認と記録**。GxP 隣接工程では、LLM 出力そのものは担保にならず、誰が・どの用語集で・どのモデルで承認したかの記録が説明責任を果たす。

---

## 6. Foundry とアプリの連携（非同期 HITL）

人のレビューは数時間〜数日かかりうるため、ワークフローを「止めて待たせる」仕組みが要る。Foundry のポータル・ワークフロー（廃止予定・チャットのみ）ではなく、後継の **Microsoft Agent Framework** の HITL 機構を使う。

- **RequestPort / request_info**：実行を一時停止し、外部（人間）からの入力を待つ。
- **Checkpoint**：外部入力を待って後から再開できる。保留中の要求は再開時に再送出される。
- ワークフローをエージェントとして使う場合、外部入力の要求は関数呼び出しとして応答に現れ、関数結果を返すことで継続する。

Foundry は引き続きエージェント（モデル）のホストとして使い、オーケストレーションだけコード側（Agent Framework）へ寄せる。

```mermaid
sequenceDiagram
  participant WF as ワークフロー(Agent Framework)
  participant BE as バックエンド
  participant DB as 記録台帳
  participant APP as レビューアプリ
  participant HU as レビュアー
  Note over WF: 承認ゲートで停止 + checkpoint保存
  WF->>BE: ① 要求 (request_info)
  BE->>DB: ② pending を書き込み
  APP->>DB: ③ pending を取得
  APP->>HU: 指摘を提示
  HU->>APP: ④ 承認 / 修正 / 却下
  APP->>DB: 判定を書き込み
  BE->>DB: ⑤ 判定を読み取り
  BE->>WF: 応答を返す
  Note over WF: ⑥ checkpoint から再開 → 最終出力
```

**アプリは入力と本人性を担い、台帳が正式記録を保持する**という役割分担。ワークフロー変数（`Local.*`）はランで消える一時値なので、GxP の監査証跡は外側の永続台帳に書く。

---

## 7. 記録層（DB）設計

指摘1件＝1行。**後で本家 Dataverse へ移行する前提で、SharePoint の列を Dataverse 互換の形に設計しておく**と、移行が「作り直し」ではなく「列の載せ替え」で済む。

### 台帳スキーマ

| 列名（両者共通） | SharePoint 型 | Dataverse 型 | 役割・設計メモ |
|---|---|---|---|
| RecordID | 1行テキスト（自採番） | テキスト（代替キー） | 自動ID/GUID に頼らない業務キー |
| 文書 | ルックアップ | ルックアップ | 文書マスタへの参照 |
| 文書カテゴリ | 選択肢 | 選択肢 | ①分類の出力を継承 |
| セグメント番号 | 数値 | 整数 | 指摘の単位 |
| 判定 | 選択肢 | 選択肢 | 承認／修正／却下 |
| 原文 / 訳文 / 差し戻し理由 | 複数行テキスト | 複数行テキスト | 監査時の突合用 |
| QA指摘種別 | 選択肢 | 選択肢 | 用語不整合／訳抜け／誤訳 |
| レビュアー | ユーザー/グループ | ルックアップ（ユーザー） | 本人性の担保 |
| 承認日時 | 日付と時刻 | 日付と時刻 | 自前列（システム列に頼らない） |
| 用語集ver / モデルver / RunID | 1行テキスト | 1行テキスト | 再現性・追跡の鍵 |

### Dataverse 互換にするルール

- **自動IDに頼らない**：SharePoint の `ID`・Dataverse の GUID は移行で一致しない。業務キー（RecordID）で識別する。
- **種別は必ず選択肢（Choice）**：手打ちテキストにしない。選択肢→選択肢でそのまま移る。
- **関係は参照（ルックアップ）**：文書・レビュアーを文字列で持たず参照にする。Dataverse のテーブル間リレーションに化ける。
- **「誰が・いつ」を専用列で**：システムの作成者／更新日時は移行されない。`レビュアー`・`承認日時` を自前列で持つ。

---

## 8. 記録層の選択肢 — 機能・監査・容量・コスト

**違いはコストだけではない。** セキュリティ・監査・容量が本質的に異なる。

| 観点 | ① SharePoint リスト | ② Dataverse for Teams | ③ 本家 Dataverse |
|---|---|---|---|
| セキュリティ | アイテム単位の権限のみ。項目（列）保護なし | 行の型は持てるが項目レベルセキュリティなし | 行レベル＋項目レベル＋RBAC |
| 監査証跡 | バージョン履歴のみ（サーバ側監査ログなし） | 限定的 | サーバ側監査ログ（誰が・いつ・どの項目を変更） |
| 容量・スケール | 1ビュー5,000件の壁（固定）／10万件手前で性能劣化／格納は最大3,000万件 | 1チーム2GB上限 | 大規模・環境分離 |
| データモデル | フラットなリスト | リレーショナル（モデル駆動アプリ不可） | 完全リレーショナル・ビジネスルール・モデル駆動 |
| 拡張性・統合 | 標準コネクタ・M365ネイティブ | 標準コネクタのみ・Teams内スコープ | プレミアム/カスタム・Dynamics連携・ALM |
| GxP適合 | 弱い（工夫で追記型ログ化は可） | 中（項目監査なし） | 強い（監査に耐える証跡を作りやすい） |
| 追加ライセンス | 0円 | 0円 | 数名のみ有償 |

**この用途での要点**

- 監査層が決定打。SharePoint のバージョン履歴では「誰がどの項目をいつ変えたか」のサーバ側証跡は残せない。埋められるのは本家 Dataverse だけ。
- 容量も他人事ではない。指摘1件＝1行で、24セグメント×文書数×版×レビュー回数で数千件は早期に到達する。5,000 件ビューの壁に当たりうる。
- **②は台帳ではなくアプリ置き場としてのみ検討**。台帳としては SharePoint に対する監査面の上積みがほぼないため、台帳の選択は実質 ①か③の二択。

## 9. コストとライセンス

コストを決めるのは **UI の言語（React か Power Apps か）ではなく、記録先に何を選ぶか**。M365 のシート（E1/E3/E5・Business）は SharePoint・Teams・Lists 等の標準コネクタを使う Power Apps／Power Automate を含み追加費用ゼロ。Dataverse やプレミアムコネクタを1つでも使うと、そのアプリの利用者全員に有償ライセンスが要る。

| 構成 | 記録先 | レビューアプリ | 追加ライセンス | 向く段階 |
|---|---|---|---|---|
| ① 最安 | SharePoint リスト | Power Apps キャンバス（標準）／Teams承認 | 0円（既存M365で可） | PoC・第一版 |
| ② Teams | Dataverse for Teams | Teams内キャンバスアプリ | 0円（Teams付きM365） | 小規模の構造化 |
| ③ 数名有償 | 本家 Dataverse | Power Apps または React | レビュアー数名のみ 約$20/user/月（不定期は従量 約$10/アクティブ） | 正式運用 |

**勘所**

- 旧「Per App（$5/user/app）」は2026年1月で新規提供終了。今の有償は Power Apps Premium 約$20/user/月、または従量（PAYG）約$10/アクティブ user/app/月。
- 連携（Foundry↔記録）の仲介は、プレミアムな Power Automate ではなく **Agent Framework のバックエンド（Azure Functions／Logic Apps 従量）**に置く。人数ぶんのライセンス不要・実行回数課金のみ。
- React＋Dataverse でも Dataverse ぶんの有償は同じ。回避したいなら記録先を標準側（SharePoint／Graph）にする。
- 翻訳・QA は Foundry エージェント（Azure の従量課金）で回すので、2026年11月に無償枠が終わる AI Builder には依存しない。Foundry 費用は Power Platform ライセンスと別勘定。
- 価格は米ドルの参考値。日本リージョン価格・税・契約で変わるため最新は Microsoft の価格ページで確認。

### 9-b. 実額シミュレーション（100頁プロトコル 英→日）

費用は **「一度きり（構築期）」と「毎月（運用期）」** に分かれ、運用期はさらに3層 —— **①従量（文書量に比例）／②固定（量に無関係）／③実行者（人数課金）**。効くのは固定層と人数。

**前提**：100頁 ≈ 5万語 ≈ 30万字（英）≈ 入力7万トークン／和訳出力12万トークン。単価は USD 参考（すべて100万単位）：GPT-4o $2.50入/$10出、GPT-4.1 $2/$8、Azure Translator 標準 $10/100万字、Custom Translator $40/100万字。

**構築期（一度きり）** — 主にエンジニア工数（社内人件費）。Azure への一度きり支払いは、Custom Translator を使わなければほぼゼロ。AI Search を作ると「作成時点から24/7課金」が始まる点に注意（＝一度きりでなく運用固定費の起点）。

**① 従量（翻訳1本＝100頁、全構成 共通）**

| 方式（②翻訳の担い手） | 100頁1本 |
|---|---|
| GPT-4o が全訳（①分類＋②翻訳＋③QA） | ≈ $2.5 |
| GPT-4.1 が全訳 | ≈ $1.9 |
| GPT-4.1 mini 下訳 ＋ 4.1 QA | ≈ $0.75 |
| Azure Translator ＋ LLM critic（実プロジェクトの実際の方向） | ≈ $3.5 |

バックエンド連携（Functions／Logic Apps 従量）は1本1セント未満。prompt caching で繰り返し入力（用語集・原文）を約50%off にできる。

**② 固定（毎月・文書量に無関係）**

| 項目 | 課金形態 | 概算/月 |
|---|---|---|
| Azure AI Search（RAG グラウンディングを使う場合・Dedicated） | 24/7固定・停止は「サービス削除」のみ | Basic ≈ $75／S1 ≈ $250 |
| Private Endpoint／監視（Log Analytics） | 少額固定 | ≈ $10 |

→ 用語7誤訳の決定論固定は **TSV glossary（固定$0・メンテ無料・都度課金なし）で足りる**。AI Search は「ICH／PMDA の版を厳密管理する要件が立ったときだけ」。使った瞬間、文書を1本も訳さなくても月$75〜が発生し、止めるにはサービス削除しかない。

**③④⑤への昇格分岐点**

- **Custom Translator（dict-only → full）**: 過去の翻訳資産から**文レベルでアラインメントされた対訳ペア**を見積り、**10,000組以上**に届くかどうかで判断する。届かなければ dict-only（用語のみ学習）が現実解 — 本プロジェクトの現状の結論はこちら。
- **AI Search（TSVから昇格するか）**: 機能面の分岐点は「単語」ではなく「版のある文書全体」（ICH／PMDA等のガイドライン）を参照させる必要が出たとき。Web検索（Bing）頼みだと参照版が都度変わり監査で説明できないため、社内で版を固定した索引が要る。コスト面の分岐点は文書量の多寡ではなく、**「版管理を誤ったリスク・手間」＞「月$75〜250の固定費」**という質的な天秤。
- **AI Search のプラン階層（Basic／S1／S2／S3）**: 上位プランほど1パーティションあたりの容量・同時クエリ負荷の上限が上がる構成が一般的。ただし本文書で一次確認済みなのは Basic／S1 の価格のみで、S2／S3 の詳細仕様は未検証（導入検討時に公式ページで要再確認）。

**費用は「文書」でなく「人数」で伸びる（最重要）**

③のライセンスは対話レビュアー1人あたり月$20。文書は1本$2.5と桁が小さいので、総額を動かすのは主に**レビュアー人数（本家 Dataverse 利用時）**。

| レビュアー数 | Dataverse ライセンス/月（Premium $20） | PAYG（$10/アクティブ） |
|---|---|---|
| 3名 | $60 | $30 |
| 10名 | $200 | $100 |
| 50名 | $1,000 | $500 |
| 100名 | $2,000 | $1,000 |

人数を抑える梃子：**(a)** PAYG＝その月に実際に開いた人だけ課金／**(b)** 記録を SharePoint 側に置けば人数に関係なく$0（項目レベル監査は捨てるトレードオフ、§8）／**(c)** Logic Apps 自動書込なら対話ライセンス不要（文書単位のみ）／**(d)** 重い裁定者だけ Premium、たまの承認者は Teams 承認へ振り分け。→ §11 の段階戦略（SharePoint で$0始動 → 監査要件が立ったら Dataverse）は、そのまま費用最適。

**この章の略語**
- **TCO**（Total Cost of Ownership）＝総保有コスト。単価でなく「構築＋運用＋保守を通した費用」で見る考え方。
- **LLM**（Large Language Model）＝大規模言語モデル。ここでは翻訳・QA を担う生成AI。
- **QA**（Quality Assurance）＝品質チェック工程。別 LLM が訳抜け・用語不整合を検査する。
- **PAYG**（Pay-As-You-Go）＝従量課金。使った分／その月にアクティブな人だけ支払う。
- **RAG**（Retrieval-Augmented Generation）＝外部知識を検索して回答に混ぜる仕組み。ここでは版管理に AI Search を使う場合。
- **TSV**（Tab-Separated Values）＝タブ区切りの表ファイル。用語対訳表（glossary）の形式で、編集は無料・翻訳時に決定論的に置換する。
- **PE**（Private Endpoint）＝閉域網内だけからアクセスする Azure のプライベート接続。情報保護のため。
- **de-dup**（de-duplication）＝重複除去。Custom Translator 再学習で既存対訳分は再課金しない仕組み。
- **AdaptCT**（Adaptive Custom Translation）＝RAG＋Few-shotで少数の対訳例からグラウンディングする方式。Fine-tuning（Custom Translator フル学習）と異なりモデル再学習が不要で、5ペア程度から使える。

## 10. レビューアプリの構築オプション

記録先（Dataverse 推奨）と UI フレームワークは別々の判断。3層（オーケストレーション／記録／UI）を分離しておけば、記録先を固定したまま UI を後から差し替えられる。

| 観点 | Power Apps | React | Logic Apps 承認 |
|---|---|---|---|
| 長所 | M365/Conflux と地続き・最速・統制付き | UX 完全自由（左右diff・キーボード裁定）・埋込可 | 構築最小・誰が承認したか自動記録 |
| 短所 | 密な diff 編集など UX に天井 | ホスティング/認証(Entra)を自前・保守が重い | セグメント単位は不可 |
| 記録先 | SharePoint / Dataverse | 同左（Web API / Graph） | Dataverse / SharePoint |
| 向くケース | 第一版・統制付き最速 | 高頻度・精密レビュー | 文書単位の署名で足りる層 |

**推奨**：まず Power Apps ＋ 標準コネクタで第一版（0円始動）。レビュアーの処理量や diff 編集の要求が UX の限界に当たったら、レビュー画面だけ React（または Power Platform 内で React を動かす code apps ※新しめ・要確認）へ差し替え。台帳とオーケストレーションは据え置きで、差し替えは局所。

### 10-b. レビューアプリの構築・運用コスト

**大前提：2軸は独立** —— **UI の選択＝「構築工数＋ホスティング固定費」**、**記録先の選択＝「実行者の人数ライセンス」**。この2つの掛け合わせで効く（「React だから高い」ではなく「Dataverse を対話利用するから人数課金」）。

**構築費（一度きり）とホスティング（毎月）**

| UI 方式 | 構築工数の目安 | ホスティング固定/月 | 保守負荷 |
|---|---|---|---|
| Power Apps canvas | 小（3〜10人日） | $0（実行はライセンス側） | 低（低コード・M365統制付き） |
| React（Static Web Apps） | 大（10〜30人日） | Free＝$0／Standard ≈ $9（SLA・PE・カスタム認証が要るなら） | 高（認証・依存更新が真の隠れコスト） |
| Logic Apps 承認 | 極小（0.5〜2人日） | $0（消費のみ・承認1件1セント未満） | 低（ただしセグメント単位は不可） |

**現実的な組み合わせ別 増分/月**（レビュアー3名想定）

| UI × 記録先 | 増分/月 | 向く層 |
|---|---|---|
| Power Apps ＋ SharePoint | ≈ $0 | 第一版（推奨） |
| Power Apps ＋ Dataverse | ≈ $60（$20×3） | 統制強化 |
| React ＋ SharePoint（Graph） | ≈ $9＋保守 | UX最優先・ライセンス回避 |
| React ＋ Dataverse | ≈ $69＋保守 | 高頻度・精密＋監査（最重） |
| Logic Apps 承認 ＋ Dataverse（自動書込） | ≈ $0＋数セント/件 | 文書単位署名で足りる層 |

Logic Apps の承認が Dataverse へ**自動書込**する形なら、監査グレードの記録を**人数ライセンスゼロ**（消費課金のみ）で持てる。ただしセグメント単位の裁定はできない。React の総コストを決めるのは月$9のホスティングではなく**継続保守の工数**（認証・Entra 登録・脆弱性パッチ）である点に注意。

**この章の略語**
- **UI**（User Interface）＝利用者が操作する画面。ここではレビュー画面。
- **Entra**（Microsoft Entra ID、旧 Azure AD）＝Microsoft の認証基盤。React を自前ホストするときのサインインに使う。
- **SLA**（Service Level Agreement）＝稼働率の保証。Static Web Apps は Free に無く、Standard で付く。
- **CI/CD**（Continuous Integration / Continuous Delivery）＝コードの自動ビルド・自動配信。React 運用の前提作業。
- **SPA**（Single Page Application）＝1枚のページ上で動く Web アプリ。React の典型形。
- **Graph**（Microsoft Graph）＝M365 データ（SharePoint 等）へアクセスする API。React が標準側へ記録するときの経路。
- **diff**＝原文と訳文の差分表示。密な diff 編集が Power Apps の UX 天井の例。

## 10-c. レビューアプリの機能設計 — CAT ツールの型を継承

§10・§10-b は「器」（UI と記録先）の話。ここではその「中身」（どんな画面機能を載せるか）を定める。レビューアプリは翻訳プロセスにおける **HITL 判断ノードそのもの**（§5）であって、後付けの QA 工程ではない。中身は翻訳業界で30年枯れた **CAT（Computer-Assisted Translation）ツール**の型をそのまま継承すればよく、再発明しない。**現代化は1点だけ** —— CAT の「MT サジェスト欄」を、本ワークフローのパイプライン出力＋その自己申告（QE スコア・critic フラグ・逆翻訳投票）に置き換える。これにより「全セグメント平等レビュー」をやめ、**機械が採点し並べる → 人は fail-closed とスコア低位だけ裁く**構造にできる（工数はセグメント数でなくフラグ数に比例）。

**CAT の代表機能と本アプリでの写像**

| CAT 機能 | 中身 | 本アプリでの写像 |
|---|---|---|
| セグメンテーション | 原文を文単位に分割し原文↔訳文を1:1整列 | パイプライン側で確定済（分類・タグ付け段の出力を継承） |
| 対訳エディタ | 左=原文／右=訳文の2ペイン、行=セグメント | ★中核 UI（§10-b の裁定画面の実体） |
| 翻訳メモリ（TM） | 過去の**承認済み**対訳DB。exact/fuzzy/context match | ICF・プロトコル定型文の再利用。検収の出口が TM の入口 |
| 用語ベース（termbase） | 承認語彙。必須語・禁止語をフラグ | 既存 TSV glossary（7誤訳）。L-Term=fail-closed |
| QA チェック（自動） | 用語・数値・タグ/書式・未訳・一貫性の機械検査 | 確定的突合（pipeline stage で全数実行）の結果表示 |
| MT 統合 | 外部 MT サジェストを TM と同じ欄に提示 | ★**本パイプライン出力**がこの欄に来る |
| Quality Estimation（QE） | 各セグメントの訳質を推定スコア化→要修正を優先 | ★triage の心臓。critic 信頼度×逆翻訳一致度を合成 |
| LQA / MQM | 誤りをカテゴリ×重大度で構造記録し減点式でスコア | ★reject 時の理由入力＝critic 改善の燃料 |
| コンコーダンス検索 | 原語・訳語を TM 横断で全文検索 | 過去確定訳の参照 |
| プロパゲーション | 同一セグメントの訳を文書内で自動反映 | 反復セグメント（定型文）の一括処理 |
| インコンテキスト プレビュー | 完成レイアウトを横で確認 | 体裁が要る文書のみ（後回し可） |
| コメント/版管理/監査証跡 | 誰がいつ何を、レビュー履歴、電子署名 | ★§7 台帳がこの実体。Part 11 の担保層 |

**パイプライン → レビュー層の受け渡し（review package）** —— アプリ設計の土台。パイプラインは訳文だけでなく、1セグメントあたり次を吐く：

```
segment_id, doc_id, order
source_text        原文
target_draft       パイプライン訳
segment_type       分類ラベル（verbatim/coded/narrative 等）
glossary_hits[]    {term, expected, applied?}      ← L-Term(fail-closed)
critic_flags[]     {axis, severity, msg, mode:closed|open}
qe_score           0-100（critic 信頼度 × 逆翻訳一致度の合成）
backtranslation    逆翻訳文 + 投票結果
provenance         {model, model_pin, pass, ts}    ← 「同一出力でなく品質担保」の根拠（§ 移植の鉄則）
status             pending / auto-pass / need-review
```

**Triage エンジン**：優先度キュー ＝ `fail-closed フラグ有` ＞ `qe_score 低位` ＞ `advisory のみ` ＞ `auto-pass`。auto-pass 条件（全確定的突合通過 ∧ critic フラグ無 ∧ qe_score≥閾値）を満たすセグメントはデフォルト accept 候補として人はスキップ可（ただし「auto-pass を承認」も台帳に残す）。fail-open/closed は軸別（L-Term/L-Gov=closed＝赤／L-Style/L-Struct=open＝黄）で並び順が機械的に決まる。

**アクション層**：accept（そのまま確定・一括可）／edit（**reason-for-change 必須**、任意で glossary/TM 昇格キューへ・**昇格は承認ゲート必須**）／reject（MQM で category×severity 構造化）／document sign-off（電子署名で文書確定＝Part 11）。

**UI レイアウト（第一版）**

```
┌ ヘッダ: doc名 / 進捗(裁定n/N) / model_pin / [サインオフ] ─────────┐
├ 左: Triage フィルタ ─┬─ 中央: 対訳グリッド ──────────┬ 右: 選択セグメント ┤
│ ●要対応(赤) ●注意(黄) │ # 原文 / 訳文(編集可) / 状態    │ QE / critic / 逆翻訳 │
│ ○auto-pass / 用語     │ ⚠フラグをインライン表示         │ [accept][edit][reject]│
└──────────────────────┴────────────────────────────┴──────────────────┘
```
設計思想：**色＝統制ラベル**（赤=fail-closed 止める／黄=fail-open 注意／緑=auto-pass）。境界を規制系統に一致させる。編集は訳文セルに直書き（別窓に出さない）。

## 10-d. 競合・市場ポジション（日本 / 製薬・CRO / COTOHA）

**大前提：MT エンジンと CAT/TMS は別カテゴリ**（混同注意）。

| | ① MT エンジン（翻訳を作る） | ② CAT / TMS（翻訳を裁く・管理する） |
|---|---|---|
| 例 | COTOHA・DeepL・Google・みらい翻訳・T-4OO | Trados・memoQ・Phrase(Memsource)・XTM・Smartling |
| 機能 | 下訳生成・用語辞書登録・レイアウト保持 | TM・termbase・QAチェック・**QE・LQA/MQM・対訳エディタ・監査証跡** |
| 役割 | 素材を吐く | 素材を人が裁く作業台 |

本レビューアプリは②。QE/LQA/MQM/監査証跡は②の機能で、①の MT エンジンにはほぼ載らない。

- **日本での普及度**：② は翻訳供給側（翻訳会社・翻訳者）で完全にスタンダード（Trados 圧倒的＞memoQ＞Phrase）。TM/termbase/QA はユビキタス、**LQA/MQM の点数化された正式プロセスは大手 LSP・エンタープライズ localization で標準**、中小・個人では QA止まりのことも多い。ただしこれらは"供給側が持つツール"で、発注側の事業会社が自前で持つものではないのが通常。
- **製薬・CRO**：治験文書翻訳は Trados 中心の CAT が定着（PMDA/ICH が厳格さを駆動）。**ただし CAT を持つのは医薬専門の翻訳会社**であって製薬・CRO の社内ではない。製薬/CRO 側が社内で進めているのはセキュアな MT 導入（COTOHA/T-4OO/DeepL Pro で下訳）止まり。→ **製薬/CRO が「自社パイプライン＋統制付きレビュー層（＝裁定と監査証跡を握る②）を社内内製する」のはまだスタンダードではない = 本ワークフローの差別化領域**（規制を moat に、MT 導入で止まっている各社に対しレビュー層まで内製）。
- **COTOHA は「この辺」を実装しているか / LLM か**：エンジンは **NMT**（NTT グループ みらい翻訳×NICT 共同開発）で **LLM ベースではない**（2025–2026 公開情報）。持つのは用語辞書登録（glossary 相当）まで、TM・QE・LQA/MQM・対訳レビュー・監査証跡は無い。= COTOHA は「① MT エンジン」＝本アプリの MT サジェスト欄に下訳を供給する外部 Tool の位置（DeepL と同じ役回り）で、②の代替にはならない。NTT の LLM は別ライン（`tsuzumi`/`tsuzumi 2`、7B・日本語特化・オンプレ）だが、COTOHA Translator のエンジンに載っている公開情報は無い（将来統合は要監視）。→ **COTOHA を使っても②のレビュー層は依然必要**。むしろ COTOHA を pipeline の一 MT エンジンとして差し込み、その出力を自社 QE/critic/監査層で裁く関係（本文書の「DeepL＝外部 Tool」と同型）。

**この章の略語**
- **CAT**（Computer-Assisted Translation）＝翻訳者を支援する編集環境。MT（機械翻訳）とは別物。
- **TM**（Translation Memory）＝承認済み対訳の再利用DB。**termbase**＝承認用語集。
- **QE**（Quality Estimation）＝正解を見ずに訳質を推定スコア化。
- **LQA**（Linguistic Quality Assurance）＝訳を誤り分類に照らして客観採点するプロセス。**MQM**（Multidimensional Quality Metrics）＝その採点に使う誤り分類表（カテゴリ×重大度）。**DQF-MQM**＝TAUS の運用枠組み DQF ＋ MQM の統合、de facto 標準。
- **MTPE**（Machine Translation Post-Editing）＝MT 出力を人が後編集する作業。QE 起点の選択的介入が 2026 の潮流。
- **LSP**（Language Service Provider）＝翻訳会社。

## 10-e. レビューアプリ 実装設計（React + SharePoint / Dataverse-ready）

§10-c は「どんな機能を載せるか」、本節は「React + SharePoint でどう実装するか」。CTN Assist で確立した GxP パターン（ALCOA+・provenance・Entra 署名・テナント主権）を継承しつつ、器だけ React にする。第一版は SharePoint、監査要件が立ったら Dataverse（§8・§10-b の判断軸）。

### レビュー画面の 3 ビュー（学習コスト最小が最優先）

- **★対訳ドキュメント（核心）**：原文ファイル(EN)と対訳ファイル(JA)を **Word 体裁のまま左右 or 上下に並置**（トグル・スクロール同期）。該当箇所クリックで**両ペインの同一セグメントが連動ハイライト**。CAT の対訳エディタを"グリッドでなく文書レイアウト"でやる形で、普段の Word 突き合わせの延長＝学習コスト最小。
- **対訳グリッド**：行=セグメントの bilingual grid（§10-c の対訳エディタ）。
- **単一文書ビュー**：訳文のみ Word 体裁＋要注意箇所ハイライト。
- **ハイライト表記**：**背景色のみ（下線なし）**。要注意箇所のみ着色（赤=要対応／黄=注意／緑=承認済）、**auto-pass は無印**（普段どおり読め、例外だけ目立つ）。

### 「Word 体裁維持 × セグメント分解」の両立

分解は内部表現に留め、人が見るのは元文書のまま。両者を結ぶのが **文字オフセット anchor**。対訳ドキュメントでは **原文 offset ↔ 訳文 offset のペア（bilingual alignment）** を持たせる（＝③翻訳段・タグ付けが出す対訳セグメント対）。

| 描画方式 | 体裁忠実度 | ハイライト重ね | 第一版 |
|---|---|---|---|
| ① mammoth.js で docx→HTML 自前描画 | 中（見出し・段落・表は再現） | ◎ 自前 DOM で span 自在 | **推奨** |
| ② Office Online / SharePoint 埋込 iframe | ◎ 完全 | ✗ iframe に手を出せず不可 | 「原本を Word で開く」リンクに留める |

- **実装リスク**：EN/JA は文境界が 1:1 で揃わない（1 EN 文 → 2 JA 文 等）。その場合は **1:N グループ単位でハイライト**（タグ付け段が alignment を group 単位で出す）。mammoth の段落・文マッピング精度とセットで詰める、対訳ドキュメント方式唯一の難所。

### QE 帯 triage ＋ スーパーユーザー閾値設定

- **帯フィルタ**：`要対応(QE<60) → 注意(60–84) → 承認済` のチップ＋前後ステッパー。要対応を捌き終えたら注意へ、の順送り。該当外は淡色化（文脈は残す）。
- **閾値はスーパーユーザー設定**：プロジェクト／文書種別ごとに Config リスト（SharePoint→Dataverse 互換）へ保存。RBAC でスーパーユーザーロールのみ開放。
- **軸オーバーライドが QE に優先**：L-Term(用語)・L-Gov(規制)=fail-closed 固定で、QE がいくら高くても要対応へ落とす。閾値はグレーゾーンの振り分けだけを決め、規制上外せない軸は緩められない。
- **閾値変更そのものを監査**：閾値を緩める＝auto-pass（人が見ない範囲）が広がる＝規制的に意味のある操作。変更履歴（誰が・いつ・旧→新）を Settings 監査ログに残す。

### アーキテクチャ（アダプタで Dataverse 差し替え）

```
[React SPA] ── MSAL (Entra ID SSO)
  UI: 対訳ドキュメント / 対訳グリッド / 裁定ストリップ / スーパーユーザー設定
  └─ IReviewRepository（抽象: listQueue/getSegments/postDecision/signOff/getConfig）
        ├─ SharePointAdapter ──(Microsoft Graph)──> SharePoint リスト   ← 第一版
        └─ DataverseAdapter  ──> Dataverse                             ← 将来（差し替えは1層だけ）
```

- **リスト**：`Documents` / `Segments`（review package＋offset ペア）/ `Decisions`（**追記のみ・削除権限剥奪**＝監査）/ `PromotionQueue`（用語昇格・承認ゲート）/ `Config`（QE 閾値・軸オーバーライド）。列名・型・選択肢値を **Dataverse 互換**に（§7）→ 移行は列マッピングで済む。
- UI とロジックは `IReviewRepository` の内側を知らない。Dataverse 移行はアダプタ差し替えだけで無改修。

### 認可（Entra ID）

- 「ロールを切る」は Entra（＝既存 M365 テナントの ID 管理、新規インフラ不要）で、**顧客テナント内で顧客管理者が実施**（テナント主権と一致）。アプリは読む側。
- **3 ロール層の切り分け**：Entra ディレクトリロール（Global Admin 等・使わない）／Azure RBAC（リソース権限・使わない）／**アプリ内認可（App Role or セキュリティグループ・これ）**。
- **推奨=App Role**：アプリ登録に `SuperUser` ロールを定義 → エンタープライズアプリでユーザー/グループに割当 → トークンの `roles` クレームを React が見て設定画面を開放。セキュリティグループ方式（`groups` クレーム）は手軽だが GUID 管理＋トークン肥大に注意。どちらも人の出し入れだけで権限が変わり、コード改修不要。

### Foundry アウトプットの取り込み（非同期 HITL）

**UI が Foundry を叩くのではなく、Foundry が SharePoint に置く → UI が拾う**（§6 request_info / checkpoint と整合）。

```
Foundry 完了 → Logic Apps/Functions が書込:
  原本 .docx → ドキュメントライブラリ / review package(offset ペア含む) → Segments / Documents.status=need-review + checkpoint_id
React UI ─ Graph で need-review を購読 → キュー → 裁定 → Decisions 追記 ＋ status=signed
Logic Apps が status 変化検知 → checkpoint_id で Foundry resume → 最終出力
```

- UI は Foundry を直接知らない → §12 の Workflows 廃止（2026-12）→Agent Framework 移行に UI が巻き込まれない。
- 書込を Logic Apps 経由にすると**レビュアーに対話ライセンス不要**（人数課金回避、§10-b）。
- **offset ペア付与はタグ付け段の責務＝取り込み仕様の最優先**（無いと対訳ドキュメントのハイライトが成立しない）。

### フィードバックループ（ナレッジ蓄積）— レビュー＝フライホイールの燃料

| レビュー操作 | 溜まる先 | 効き方 |
|---|---|---|
| 承認した訳 | 翻訳メモリ TM | 次回 exact/fuzzy 再利用 |
| edit（用語直し） | 用語集 termbase へ**昇格キュー** | 次回から決定論的に正訳語 |
| reject（MQM 分類） | critic 改善コーパス（few-shot / AdaptCT） | critic が同型誤りを検出しやすく |

- **LLM 自動再学習ではない**：溜まるのは**グラウンディング資産**（TM・用語集・few-shot）で、次回 run の入力に効く＝モデル pin を崩さず品質だけ上がる（§ 移植と精度の鉄則）。
- **承認なき自動昇格は禁止**（無断昇格＝フライホイール逆回転）。用語昇格は PromotionQueue → スーパーユーザー/用語責任者の承認 → P2 入り。
- 書き戻しは Decisions リスト → Logic Apps が承認分を harvest（非同期）。

### 単独アプリ vs Teams（両対応）

- **同一 React SPA が実体、Teams は"包み"**。Static Web Apps の URL を (a) ブラウザ直＝単独アプリ／(b) Teams タブ manifest で包む＝Teams タブ。ビルド同一。
- **Teams 固有コードは認証初期化の1点だけ**：起動時に Teams コンテキストを feature-detect → Teams 内なら `@microsoft/teams-js` の SSO、外なら通常 MSAL。Teams 依存を1ファイルに隔離すれば**単独アプリは Teams パッケージ無しで完全動作**。
- 通知は Adaptive Card（軽い文書単位サインオフはカード完結、重い裁定はタブへ deep-link）。外部レビュアー=単独 Web／社内=Teams タブ の併用可。

**この節の略語**
- **SPA**（Single Page Application）＝1枚ページで動く Web アプリ。React の典型形。
- **MSAL**（Microsoft Authentication Library）＝Entra ID サインイン用ライブラリ。
- **App Role**＝アプリ登録に定義するアプリ固有の役割。トークンの `roles` クレームで受け取る。
- **offset / anchor**＝原文・訳文中の文字位置。セグメントと元文書を結ぶ。
- **bilingual alignment**＝原文セグメントと訳文セグメントの対応付け（1:1 or 1:N）。
- **TM**（Translation Memory）＝承認済み対訳の再利用DB。**termbase**＝承認用語集。
- **teams-js**（@microsoft/teams-js）＝Teams タブから SSO・コンテキスト取得する SDK。

## 12. Foundry の前提と注意

- Foundry の Workflow ビジュアルビルダーは **Preview**（SLA なし・本番非推奨）。
- Microsoft は **2026年12月1日に Workflows を廃止予定**。新規は Microsoft Agent Framework、既存は YAML をエクスポートして移行することを推奨。
- 学習・PoC にはポータルが手早いが、本番前提なら**最初から YAML をエクスポートし Agent Framework 側で管理**。今回のパターン（分類・翻訳・検証・HITL・ループ）はすべてコード側で表現でき、YAML が移行の携行物になる。
- 移行先の主要オプション：Microsoft Agent Framework（推奨・コードファースト）／ビジュアル重視なら Azure Logic Apps（承認アクションを標準装備）／軽量なエージェント間連携なら A2A。

## 付録A：用語・略語集（文書全体）

各章末の略語に加え、章をまたいで出てくる主要な略語をここでスペルアウトする。

**規制・治験**
- **ICH**（International Council for Harmonisation）＝医薬品規制調和国際会議。治験文書の国際基準・定訳（規定訳）の出所。
- **PMDA**（Pharmaceuticals and Medical Devices Agency）＝医薬品医療機器総合機構。日本の規制当局。
- **MedDRA**（Medical Dictionary for Regulatory Activities）＝ICH 国際医薬用語集。用語ごとに規定訳を持つため、生成任せにせず決定論的に突合する対象。
- **GxP**＝Good x Practice の総称（GMP＝製造／GCP＝臨床試験／GVP＝安全性監視 など）。規制下の品質基準群。この隣接工程では「LLM 出力そのもの」でなく「誰が・どの用語集で・どのモデルで承認したか」の記録が担保になる。
- **21 CFR Part 11 / Part 11**＝米 FDA の電子記録・電子署名規則。改ざん防止と「誰が・いつ・何を承認したか」の証跡を要求する。本設計の記録層はこれに耐える証跡づくりが目的。
- **CSR／IB／SOP**＝治験総括報告書（Clinical Study Report）／治験薬概要書（Investigator's Brochure）／標準業務手順書（Standard Operating Procedure）。①分類が判定する文書カテゴリの例。

**プラットフォーム・技術**
- **Foundry**＝Microsoft Foundry（旧 Azure AI Foundry）。エージェント（モデル）のホスト基盤。
- **Agent Framework**＝Microsoft Agent Framework。オーケストレーションをコード側に寄せる後継。HITL の一時停止・再開（checkpoint）を担う。
- **HITL**（Human-in-the-Loop）＝人間が最終承認する統制。「コスト」ではなく統制のクレジットと捉え、粒度（指摘だけ裁定）で右サイズ化する。
- **checkpoint**＝ワークフローの一時停止・再開点。人のレビュー待ち（数時間〜数日）を挟むための仕組み。
- **Dataverse**＝Power Platform の関係型データ基盤。行レベル＋項目レベルの権限・サーバ側監査ログに強く、GxP 証跡を作りやすい。
- **JSON／JSON Schema**＝構造化データ形式／その型定義。①分類・③QA の出力を機械可読に固定するために使う。
- **NMT**（Neural Machine Translation）＝ニューラル機械翻訳。Azure Translator の標準エンジン。
- **Power Fx**＝Power Platform の数式言語。Foundry ワークフローの変数（`System.` ＝読み取り専用のシステム変数／`Local.` ＝自作のローカル変数）を扱う。

**製薬の部門略語**（レビュアーが属する部門の例）
- **RA**＝薬事（Regulatory Affairs）、**PV**＝ファーマコビジランス／安全性監視（Pharmacovigilance）、**CD**＝臨床開発（Clinical Development）、**MA**＝メディカルアフェアーズ（Medical Affairs）、**CMC**＝製造・品質管理（Chemistry, Manufacturing and Controls）。

## 付録：GitHub Pages 公開手順

このリポジトリには2ファイルを置く想定。

- `index.md` … 本文（この文書）。GitHub 上でそのまま開くと Mermaid 図が描画される。
- `index.html` … Pages 公開用の薄いレンダラ。`index.md` を読み込み、marked で本文を、mermaid で図を描画する。

**公開手順**

1. リポジトリに `index.md` と `index.html` を置く。
2. リポジトリの Settings → Pages → Source を `Deploy from a branch` にし、対象ブランチ（例：`main`）／フォルダ（`/root`）を選ぶ。
3. 数分後、`https://<ユーザー名>.github.io/<リポジトリ名>/` で図付きページが表示される。

> Jekyll のデフォルトテーマは Mermaid を描画しないため、Pages では `index.html`（mermaid.js を読み込む）を入口にするのが確実。GitHub のリポジトリ画面で `index.md` を開けば、追加設定なしで図が描画される。
